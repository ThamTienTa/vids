<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vids</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;
  --border:#222;--border2:#333;
  --text:#f5f5f0;--muted:#666;--hint:#333;
  --accent:#e8ff47;--accent-text:#0a0a0a;
  --red:#ff4444;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Bebas Neue',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* GRAIN OVERLAY */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4}

/* HEADER */
header{padding:32px 40px 0;display:flex;align-items:center;justify-content:space-between;position:relative}
header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--border)}
.logo{font-family:var(--display);font-size:48px;letter-spacing:0.05em;line-height:1;color:var(--text)}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:16px}
.upload-btn{font-family:var(--display);font-size:18px;letter-spacing:.1em;padding:10px 28px;background:var(--accent);color:var(--accent-text);border:none;border-radius:4px;cursor:pointer;transition:transform .1s,background .1s}
.upload-btn:hover{background:#f0ff60;transform:scale(1.02)}
.upload-btn:active{transform:scale(.97)}
.count-badge{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em}

/* UPLOAD MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:32px;width:100%;max-width:480px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.modal h2{font-family:var(--display);font-size:28px;letter-spacing:.05em;margin-bottom:20px}
.drop-zone{border:2px dashed var(--border2);border-radius:8px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:rgba(232,255,71,.04)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:36px;margin-bottom:10px}
.drop-text{font-size:15px;font-weight:300;color:var(--muted)}
.drop-text strong{color:var(--text);font-weight:500}
.drop-hint{font-family:var(--mono);font-size:11px;color:var(--hint);margin-top:6px}
.field{margin-top:16px}
.field label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
.field input{width:100%;font-family:var(--sans);font-size:14px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--hint)}
.progress-wrap{margin-top:16px;display:none}
.progress-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .2s}
.progress-label{font-family:var(--mono);font-size:11px;color:var(--muted)}
.submit-btn{width:100%;margin-top:20px;font-family:var(--display);font-size:20px;letter-spacing:.1em;padding:14px;background:var(--accent);color:var(--accent-text);border:none;border-radius:6px;cursor:pointer;transition:background .1s,transform .1s}
.submit-btn:hover{background:#f0ff60}
.submit-btn:disabled{background:var(--border2);color:var(--muted);cursor:not-allowed;transform:none}
.upload-error{font-family:var(--mono);font-size:12px;color:var(--red);margin-top:10px;display:none}

/* GRID */
main{padding:40px}
.section-label{font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;gap:12px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px}
.vid-card{position:relative;aspect-ratio:16/9;background:var(--surface);cursor:pointer;overflow:hidden;group}
.vid-card video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
.vid-card:hover video{transform:scale(1.04)}
.vid-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 50%);opacity:0;transition:opacity .2s}
.vid-card:hover .vid-overlay{opacity:1}
.vid-info{position:absolute;bottom:0;left:0;right:0;padding:16px;transform:translateY(8px);transition:transform .2s;opacity:0}
.vid-card:hover .vid-info{transform:translateY(0);opacity:1}
.vid-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vid-meta{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.5);margin-top:3px}
.play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);transition:transform .2s;background:rgba(232,255,71,.9);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center}
.vid-card:hover .play-icon{transform:translate(-50%,-50%) scale(1)}
.play-icon svg{width:20px;height:20px;fill:var(--accent-text);margin-left:3px}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox video{max-width:90vw;max-height:75vh;border-radius:6px}
.lightbox-title{font-family:var(--display);font-size:24px;letter-spacing:.05em;margin-top:16px;color:var(--text)}
.lightbox-close{position:absolute;top:24px;right:28px;background:none;border:none;color:var(--muted);font-size:28px;cursor:pointer;line-height:1}
.lightbox-close:hover{color:var(--text)}

/* EMPTY */
.empty{padding:80px 20px;text-align:center;color:var(--muted)}
.empty-big{font-family:var(--display);font-size:64px;letter-spacing:.05em;color:var(--border2)}
.empty p{font-family:var(--mono);font-size:13px;margin-top:12px}

/* LOADING */
.loading{display:flex;gap:6px;justify-content:center;padding:60px}
.ld{width:8px;height:8px;border-radius:50%;background:var(--border2);animation:pulse 1.2s infinite}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(1);background:var(--border2)}40%{transform:scale(1.3);background:var(--accent)}}

@media(max-width:600px){
  header{padding:20px;}
  .logo{font-size:32px}
  main{padding:20px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">VI<span>DS</span></div>
  <div class="header-right">
    <span class="count-badge" id="countBadge"></span>
    <button class="upload-btn" onclick="openModal()">+ UPLOAD</button>
  </div>
</header>

<main>
  <div class="section-label">all videos</div>
  <div id="gridContainer"><div class="loading"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div></div>
</main>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>DROP A VID</h2>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="video/*" onchange="handleFile(event)">
      <div class="drop-icon">🎬</div>
      <div class="drop-text"><strong>click to choose</strong> or drag & drop</div>
      <div class="drop-hint" id="fileHint">mp4, mov, webm — any size</div>
    </div>
    <div class="field">
      <label>title (optional)</label>
      <input type="text" id="titleInput" placeholder="leave blank to use filename">
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel">uploading...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="upload-error" id="uploadError"></div>
    <button class="submit-btn" id="submitBtn" onclick="uploadVideo()" disabled>UPLOAD</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <video id="lightboxVideo" controls></video>
  <div class="lightbox-title" id="lightboxTitle"></div>
</div>

<script>
const SUPABASE_URL = "https://ibsjnaqjikxpiteavzca.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY"; // IMPORTANT
const BUCKET = "videos";

let selectedFile = null;

// ── INIT ─────────────────────────────
async function init() {
  loadVideos();
}

// ── LOAD VIDEOS ───────────────────────
async function loadVideos() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/storage/v1/object/list/${BUCKET}?limit=100`,
      {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY,
        },
      }
    );

    const files = await res.json();
    renderGrid(files);
  } catch (err) {
    console.log(err);
    document.getElementById("gridContainer").innerHTML =
      "<div class='empty'>FAILED TO LOAD</div>";
  }
}

// ── RENDER ───────────────────────────
function getUrl(name) {
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${name}`;
}

function renderGrid(files) {
  const vids = files.filter(f => f.name);

  document.getElementById("countBadge").textContent =
    vids.length + " videos";

  if (!vids.length) {
    document.getElementById("gridContainer").innerHTML =
      "<div class='empty'>NO VIDEOS</div>";
    return;
  }

  document.getElementById("gridContainer").innerHTML =
    `<div class="grid">
      ${vids.map(v => `
        <div class="vid-card" onclick="openLightbox('${getUrl(v.name)}','${v.name}')">
          <video src="${getUrl(v.name)}" muted></video>
        </div>
      `).join("")}
    </div>`;
}

// ── UPLOAD ───────────────────────────
function handleFile(e) {
  selectedFile = e.target.files[0];
  document.getElementById("submitBtn").disabled = false;
}

async function uploadVideo() {
  if (!selectedFile) return;

  const fileName = Date.now() + "-" + selectedFile.name;

  const res = await fetch(
    `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${fileName}`,
    {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": selectedFile.type || "video/mp4",
      },
      body: selectedFile,
    }
  );

  if (!res.ok) {
    alert("Upload failed");
    return;
  }

  closeModal();
  loadVideos();
}

// ── MODAL ────────────────────────────
function openModal() {
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

// ── LIGHTBOX ─────────────────────────
function openLightbox(url, title) {
  document.getElementById("lightboxVideo").src = url;
  document.getElementById("lightbox").classList.add("open");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}

init();
</script>
</body>
</html>
